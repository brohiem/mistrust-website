<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="Mistrust AI is redefining how organizations verify trust in the age of AI. Join the waitlist.">
    <meta property="og:title" content="Mistrust AI - Trust Nothing. Verify Everything.">
    <meta property="og:description" content="Redefining how organizations verify trust in the age of AI.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mistrust.ai">
    <link rel="canonical" href="https://mistrust.ai">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

<body>
    <div class="page">
        <!-- Ambient glow -->
        <div class="glow"></div>

        <!-- Main content -->
        <main class="hero">
            <div class="badge" data-animate="fade-up" data-delay="0">
                <span class="badge-dot"></span>
                <span>Mistrust AI &middot; Coming Soon</span>
            </div>

            <h1 class="headline" data-animate="fade-up" data-delay="1">
                Trust nothing.<br>
                <em>Verify everything.</em>
            </h1>

            <p class="subtext" data-animate="fade-up" data-delay="2">
                AI-powered verification for the zero-trust era.<br>
                Be first to experience a new standard of digital trust.
            </p>

            <form class="waitlist" data-animate="fade-up" data-delay="3" autocomplete="off">
                <div class="input-group">
                    <input
                        type="email"
                        name="email"
                        placeholder="Your Email Address"
                        required
                        autocomplete="email"
                    >
                    <button type="submit">
                        <span class="btn-text">Get Early Access</span>
                        <span class="btn-success">You're In</span>
                    </button>
                </div>
                <p class="form-note">Join 2,400+ on the waitlist. No spam, ever.</p>
            </form>
        </main>

        <!-- Animated horizon -->
        <div class="horizon" data-animate="fade-in" data-delay="4">
            <canvas id="horizon-canvas"></canvas>
        </div>

        <!-- Footer -->
        <footer class="footer" data-animate="fade-up" data-delay="5">
            <span>&copy; 2026 Mistrust AI</span>
            <span class="footer-sep">&middot;</span>
            <a href="mailto:hello@mistrust.ai">Contact</a>
            <span class="footer-sep">&middot;</span>
            <a href="#">Privacy</a>
